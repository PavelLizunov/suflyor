<!doctype html>
<html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>suflyor — галерея иконок</title><style>
body{margin:24px;background:#151b23;color:#e8eef4;font:14px Segoe UI,sans-serif}p{color:#aebccc}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(135px,1fr));gap:10px}.card{display:grid;grid-template-columns:36px 1fr;align-items:center;gap:10px;padding:12px;background:#1c232d;border:1px solid #34404e;border-radius:8px}.card:has(input:checked){border-color:#f85149;background:#332126}.card img{width:32px;height:32px}.card label{overflow-wrap:anywhere}input{width:18px;height:18px}textarea{width:100%;min-height:80px;background:#10161e;color:#e8eef4;border:1px solid #34404e}</style></head>
<body><h1>Q3 — все SVG-иконки</h1><p>Все карточки должны выглядеть ровно на общей сетке 16×16. Отметь иконки, которые нужно перерисовать.</p><div class="grid" id="grid"></div><h2>Комментарий</h2><textarea></textarea>
<script>const names=`ai archive arrow-up audio brain bubble camera check coach copy diag flame gear grip kb knowledge lock maximize mic micslash minimize monitor more pause pencil play plus refresh restart restore select-text session-start sos star stealth stop stt summary system-audio tiles trash update user voice x`.split(' ');document.querySelector('#grid').innerHTML=names.map(n=>`<label class="card"><img src="../slint-experiment/assets/icons/${n}.svg" alt=""><span>${n}.svg</span><input type="checkbox" title="перерисовать"></label>`).join('');</script></body></html>
