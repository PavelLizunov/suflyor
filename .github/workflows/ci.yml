# Machine-independent gate (added 2026-06-14 from the regression-risk audit).
#
# The local `.claude/hooks/git-gate.ps1` is the ONLY enforcement today, and it
# is fail-OPEN: a commit/push from a plain shell, a different machine, a
# `--no-verify`, or a cargo not at the hard-coded path runs NONE of the checks.
# This workflow recomputes the same checks on GitHub regardless of how the
# commit was made, so a broken fmt/clippy/test can't reach a release unnoticed.
#
# Windows-only by design — the product is pure Win32 + WASAPI + Slint. Mirrors
# the local gate's 5 layers (fmt --check, clippy -D warnings, FULL cargo test —
# NOT --lib, so the tests/ guard tests run) for BOTH standalone crates.
#
# Selected-path contract (docs-only fast path):
#   Classification lives in .github/scripts/is-docs-only.sh (single source of
#   truth, shared with security.yml).  A PR is docs-only when EVERY changed
#   path in the raw git diff (--name-only --no-renames base..head) matches
#   *.md OR lives under docs/.  Any other path — Rust source, Cargo.toml /
#   Cargo.lock, *.slint, workflow YAML, scripts/, deny.toml, .gitleaks.toml,
#   etc. — selects the full-CI path.  Detection never reads PR title, body,
#   or labels.  Docs-only PRs skip the Windows rust job; the gate still
#   concludes green.  Classifier failure fails the gate (fail-closed).
name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# A newer push to the same ref cancels the in-flight run; the replacement
# run emits its own gate check for the new HEAD.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.classify.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: classify
        shell: bash
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          result="$(bash .github/scripts/is-docs-only.sh "$BASE_SHA" "$HEAD_SHA")"
          case "$result" in
            true)  echo "rust=false" >> "$GITHUB_OUTPUT" ;;
            false) echo "rust=true"  >> "$GITHUB_OUTPUT" ;;
            *) echo "unexpected classifier output: '$result'" >&2; exit 1 ;;
          esac

  rust:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: windows-latest
    env:
      CARGO_PROFILE_DEV_DEBUG: "0"
      CARGO_PROFILE_TEST_DEBUG: "0"
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # Cache each crate's target dir (no root workspace → two separate ones).
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            overlay-backend
            slint-experiment
            suflyor-tts

      # ---- overlay-backend (shared logic) ----
      - name: backend fmt --check
        run: cargo fmt --manifest-path overlay-backend/Cargo.toml --all -- --check
      - name: backend clippy -D warnings
        run: cargo clippy --manifest-path overlay-backend/Cargo.toml --all-targets -- -D warnings
      - name: backend test (full suite, incl. tests/)
        run: cargo test --manifest-path overlay-backend/Cargo.toml

      # ---- slint-experiment (overlay-host binary + UI) ----
      - name: slint fmt --check
        run: cargo fmt --manifest-path slint-experiment/Cargo.toml --all -- --check
      - name: slint clippy -D warnings
        run: cargo clippy --manifest-path slint-experiment/Cargo.toml --all-targets -- -D warnings
      - name: slint test (full suite, incl. i18n + reset + version guards)
        run: cargo test --manifest-path slint-experiment/Cargo.toml

      # ---- suflyor-tts (read-aloud sidecar — SHIPPED in the installer) ----
      # It declares deny-lints that were never enforced; gate it like the rest.
      - name: tts fmt --check
        run: cargo fmt --manifest-path suflyor-tts/Cargo.toml --all -- --check
      - name: tts clippy -D warnings
        run: cargo clippy --manifest-path suflyor-tts/Cargo.toml --all-targets -- -D warnings
      - name: tts test
        run: cargo test --manifest-path suflyor-tts/Cargo.toml

  # Stable required context: "gate".  `if: always()` is load-bearing:
  # docs-only PRs skip the rust job, and without always() GitHub would skip
  # gate too (a needed job was skipped), leaving the required context missing.
  # With always(), gate runs, validates the selector, and concludes.
  gate:
    if: always()
    needs: [changes, rust]
    runs-on: ubuntu-latest
    steps:
      - env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          RUST_NEEDED: ${{ needs.changes.outputs.rust }}
          RUST_RESULT: ${{ needs.rust.result }}
        run: |
          # The path selector must have completed — without its output we
          # cannot distinguish "docs-only, rust legitimately skipped" from
          # "changes job crashed, rust never scheduled".  Fail closed.
          test "$CHANGES_RESULT" = "success" || exit 1
          case "$RUST_NEEDED" in
            true|false) ;;
            *) echo "invalid rust value: '$RUST_NEEDED'" >&2; exit 1 ;;
          esac
          # Docs-only (rust != true): gate passes regardless of rust result
          # (rust is expected to be "skipped").
          # Code/mixed (rust == true): rust must have succeeded.
          test "$RUST_NEEDED" != "true" || test "$RUST_RESULT" = "success"

  # Advisory regression tests for the path selector and gate logic.
  # Uses only bash + git already on the runner — no downloads.
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: docs-only classifier regression test
        run: bash .github/scripts/test-docs-only-detection.sh
      - name: gate logic regression test
        run: bash .github/scripts/test-gate-logic.sh
