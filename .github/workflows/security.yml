# Supply-chain + secret scanning. Separate from ci.yml (the fmt/clippy/test
# build gate) so a slow advisory-DB fetch never blocks fast build feedback.
name: security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # weekly — catch a freshly-disclosed advisory between releases

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  cargo-deny:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [overlay-backend, slint-experiment, suflyor-tts]
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      # A per-crate manifest does not auto-find the repo-root deny.toml.
      - run: cargo deny --manifest-path ${{ matrix.crate }}/Cargo.toml --config deny.toml check advisories bans sources licenses
