# Supply-chain + secret scanning. Separate from ci.yml (the fmt/clippy/test
# build gate) so a slow advisory-DB fetch never blocks fast build feedback.
name: security

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 6 * * 1" # weekly — catch a freshly-disclosed advisory between releases

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

  cargo-deny:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate: [overlay-backend, slint-experiment, suflyor-tts]
    steps:
      - uses: actions/checkout@v4
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      # Manual invocation (not the action) for full arg-order control: `--config`
      # is a `check` SUBCOMMAND option (not global), and a per-crate manifest does
      # NOT auto-find the repo-root deny.toml. advisories + bans + sources
      # (licenses left out for now — see deny.toml).
      - run: cargo deny --manifest-path ${{ matrix.crate }}/Cargo.toml check --config deny.toml advisories bans sources
