# gitleaks — block real secrets from entering TRACKED files. This is the one
# secret path the runtime config.json redaction does NOT cover: a key committed
# by hand (git add -f, a key pasted into a commit message or a doc). The default
# ruleset catches Groq/OpenAI/AWS/GitHub-style tokens; the allowlist below keeps
# the codebase's own test fixtures + placeholders from false-positiving.
title = "suflyor"

[extend]
useDefault = true

[allowlist]
description = "Test fixtures and placeholders, not real secrets"
regexes = [
  '''gsk_SECRET''',
  '''gsk_test''',
  '''OLD-bearer''',
  '''BRIDGE_SECRET''',
  '''your-api-key''',
  '''<current access token>''',
]
# Generated tester checklists (docs/*.html) embed a `localStorage` progress-KEY
# whose 23-char value trips gitleaks' generic high-entropy rule — but it is a
# storage key, never used in any request/auth (verified 2026-07-05). These false
# positives kept the `security` workflow RED on every push (so it got ignored).
# A real secret pasted into a doc is still caught by GitHub's native secret-scanning
# + push-protection (enabled on the repo), so skipping generated HTML here is safe.
paths = [
  '''docs/.*\.html$''',
]
